name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for the append-only diff against the PR base

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Check vendored schema freshness
        # .github/scripts/openbindings.schema.json is a vendored copy of the
        # spec's meta-schema; sync-schema.sh refreshes it (and --check fails
        # CI when it drifts from the spec repo).
        run: bash .github/scripts/sync-schema.sh --check

      - name: Validate interfaces against the OBI schema
        run: |
          for f in */[0-9]*.json; do
            echo "validating $f"
            ajv validate -s .github/scripts/openbindings.schema.json -d "$f" --spec=draft2020 -c ajv-formats
          done

      - name: Validate conformance fixtures against the fixture schema
        run: |
          for f in conformance/selection/*.json; do
            [ "$f" = "conformance/selection/fixture.schema.json" ] && continue
            echo "validating $f"
            ajv validate -s conformance/selection/fixture.schema.json -d "$f" --spec=draft2020
          done

      - name: Validate comparison corpus against its schemas
        run: |
          ajv validate -s conformance/comparison/manifest.schema.json -d conformance/comparison/manifest.json --spec=draft2020
          for f in conformance/comparison/*/*.json; do
            echo "validating $f"
            ajv validate -s conformance/comparison/fixture.schema.json -d "$f" --spec=draft2020
          done

      - name: Check comparison manifest consistency
        # The manifest is the corpus index: every listed path must exist, every
        # fixture file must be listed, and each fixture's expected verdict must
        # match its manifest entry (the SDK harnesses assert the same).
        run: |
          node -e '
            const fs = require("fs");
            const root = "conformance/comparison/";
            const m = JSON.parse(fs.readFileSync(root + "manifest.json", "utf8"));
            const listed = new Set(m.files.map((e) => e.path));
            let bad = 0;
            for (const e of m.files) {
              if (!fs.existsSync(root + e.path)) { console.error("missing file: " + e.path); bad++; continue; }
              const fix = JSON.parse(fs.readFileSync(root + e.path, "utf8"));
              if (fix.expected.summary.verdict !== e.verdict) { console.error("verdict mismatch: " + e.path); bad++; }
              if (fix.mode !== e.mode) { console.error("mode mismatch: " + e.path); bad++; }
            }
            for (const dir of ["profile", "structural", "subsumption", "suppression"]) {
              if (!fs.existsSync(root + dir)) continue;
              for (const f of fs.readdirSync(root + dir)) {
                if (f.endsWith(".json") && !listed.has(dir + "/" + f)) { console.error("unlisted fixture: " + dir + "/" + f); bad++; }
              }
            }
            if (bad) process.exit(1);
            console.log("comparison manifest consistent (" + m.files.length + " fixtures)");
          '

      - name: Validate fixture-embedded documents against the OBI schema
        # Each fixture embeds complete OBI documents; the reference SDK
        # harnesses run full document validation on them, this step catches
        # drift for corpus-only changes without an SDK checkout.
        run: |
          mkdir -p "$RUNNER_TEMP/fixture-docs"
          node -e '
            const fs = require("fs");
            let n = 0;
            for (const f of fs.readdirSync("conformance/selection")) {
              if (!f.endsWith(".json") || f === "fixture.schema.json") continue;
              const file = JSON.parse(fs.readFileSync("conformance/selection/" + f, "utf8"));
              for (const t of file.tests) {
                fs.writeFileSync(process.env.RUNNER_TEMP + "/fixture-docs/" + f.replace(/\.json$/, "") + "-" + n++ + ".json", JSON.stringify(t.document));
              }
            }
            const m = JSON.parse(fs.readFileSync("conformance/comparison/manifest.json", "utf8"));
            for (const e of m.files) {
              const fix = JSON.parse(fs.readFileSync("conformance/comparison/" + e.path, "utf8"));
              for (const side of ["left", "right"]) {
                fs.writeFileSync(process.env.RUNNER_TEMP + "/fixture-docs/" + e.path.replace(/[\/]/g, "-").replace(/\.json$/, "") + "-" + side + ".json", JSON.stringify(fix[side]));
                n++;
              }
            }
            console.log("extracted " + n + " embedded documents");
          '
          for f in "$RUNNER_TEMP"/fixture-docs/*.json; do
            echo "validating embedded document $f"
            ajv validate -s .github/scripts/openbindings.schema.json -d "$f" --spec=draft2020 -c ajv-formats
          done

      - name: Check canonical field ordering
        # The checker skips any document written against an older openbindings
        # version than the newest among the inputs (none at present).
        run: node .github/scripts/check-canonical-order.mjs */[0-9]*.json

      - name: Check shared schemas stay identical
        # Same-named schemas are duplicated by hand across contracts
        # (self-containment convention); this keeps the copies identical.
        run: node .github/scripts/check-shared-schemas.mjs */[0-9]*.json

      - name: Enforce immutability of published version files
        # Dormant pre-launch: version files are working drafts amendable in
        # place until the first real release (surface-alignment loop, D2).
        # Create .github/LAUNCHED to arm this check at launch. The marker is
        # read from the PR base ref, not the checkout, so a PR cannot disarm
        # the gate for its own changes; append-only means anything but an
        # addition (edit, delete, rename) of a version file fails.
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if ! git cat-file -e "$base:.github/LAUNCHED" 2>/dev/null; then
            echo "gate dormant pre-launch (no .github/LAUNCHED on the base ref)"
            exit 0
          fi
          violations=$(git diff --no-renames --name-status "$base"...HEAD | awk -F'\t' '$1 != "A" && $2 ~ /^[^\/]+\/[0-9][^\/]*\.json$/ { print }')
          if [ -n "$violations" ]; then
            echo "::error::Published interface version files are append-only; these were changed:"
            echo "$violations"
            echo "Ship a new <name>/<version>.json instead of editing, deleting, or renaming a released file."
            exit 1
          fi
          echo "no published version files changed"
