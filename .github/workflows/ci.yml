name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for the append-only diff against the PR base

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Check vendored schema freshness
        # .github/scripts/openbindings.schema.json is a vendored copy of the
        # spec's meta-schema; sync-schema.sh refreshes it (and --check fails
        # CI when it drifts from the spec repo).
        run: bash .github/scripts/sync-schema.sh --check

      - name: Validate interfaces against the OBI schema
        run: |
          for f in */[0-9]*.json; do
            echo "validating $f"
            ajv validate -s .github/scripts/openbindings.schema.json -d "$f" --spec=draft2020 -c ajv-formats
          done

      - name: Check canonical field ordering
        # The checker skips any document written against an older openbindings
        # version than the newest among the inputs (none at present).
        run: node .github/scripts/check-canonical-order.mjs */[0-9]*.json

      - name: Enforce immutability of published version files
        # Dormant pre-launch: version files are working drafts amendable in
        # place until the first real release (surface-alignment loop, D2).
        # Create .github/LAUNCHED to arm this check at launch.
        if: github.event_name == 'pull_request' && hashFiles('.github/LAUNCHED') != ''
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          modified=$(git diff --diff-filter=M --name-only "$base"...HEAD | grep -E '^[^/]+/[0-9][^/]*\.json$' || true)
          if [ -n "$modified" ]; then
            echo "::error::Published interface version files are immutable; these were modified:"
            echo "$modified"
            echo "Ship a new <name>/<version>.json instead of editing a released file."
            exit 1
          fi
          echo "no published version files modified"
